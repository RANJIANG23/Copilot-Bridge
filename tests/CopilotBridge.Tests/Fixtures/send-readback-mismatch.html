<!doctype html><meta charset="utf-8">
<div id="messages"></div>
<textarea placeholder="消息"></textarea>
<button aria-label="发送" id="send">发送</button>
<script>
window.sendCount = 0;
window.mutated = false;
const composer = document.querySelector('textarea');
composer.addEventListener('input', () => {
  if (!window.mutated && composer.value) {
    window.mutated = true;
    composer.value += 'X';
  }
});
document.querySelector('#send').onclick = () => window.sendCount++;
</script>
